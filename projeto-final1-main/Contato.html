<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Contato - Zumbi GameArte</title>
  <link rel="stylesheet" href="contato.css">
</head>
<body>

<header>
  <h1>Contato</h1>
</header>

<section class="contato-container">

  <!-- Lado esquerdo: informações -->
  <div class="contato-info">
    <h2>Fale Conosco</h2>
    <p>Email: <a href="mailto:contato@zumbigamearte.com">contato@zumbigamearte.com</a></p>
    <p>Instagram: <a href="https://instagram.com/zumbigamearte" target="_blank">@zumbigamearte</a></p>
  </div>

  <!-- Lado direito: formulário -->
  <div class="contato-form">
    <form>
      <label for="email">Seu email</label>
      <input type="email" id="email" name="email" required>

      <label for="nome">Seu nome</label>
      <input type="text" id="nome" name="nome" required>

      <label for="mensagem">Digite sua mensagem</label>
      <textarea id="mensagem" name="mensagem" rows="5" required></textarea>

      <button type="submit">Enviar</button>
    </form>
  </div>

</section>

<footer>
  <p>© 2026 Zumbi GameArte</p>
</footer>

</body>
</html>
