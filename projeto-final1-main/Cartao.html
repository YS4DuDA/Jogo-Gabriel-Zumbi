<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pagamento com Cartão</title>
</head>

<body style="background:#111; color:white; display:flex; justify-content:center; align-items:center; height:100vh; font-family:Arial;">

<div style="background:#1c1c1c; padding:30px; border-radius:10px; text-align:center;">
    <h2>Pagamento com Cartão</h2>

    <input type="text" placeholder="Nome no Cartão"><br><br>
    <input type="text" placeholder="Número do Cartão"><br><br>
    <input type="text" placeholder="CVV"><br><br>
    <input type="text" placeholder="Validade (MM/AA)"><br><br>
    

    <button onclick="finalizar()">Finalizar Compra</button>
</div>

<script>
function finalizar() {
    alert("Pagamento realizado com sucesso! 💳");
    window.location.href = "index.html";
}
</script>

</body>
</html>
